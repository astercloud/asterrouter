name: GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asterrouter_release_test
          POSTGRES_USER: asterrouter
          POSTGRES_PASSWORD: asterrouter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asterrouter -d asterrouter_release_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Resolve tag
        id: meta
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${DISPATCH_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid release tag: ${TAG}" >&2
            exit 1
          fi
          TAG="v${TAG#v}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate release version sources
        env:
          EXPECTED_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          BACKEND_VERSION="$(tr -d '\r\n' < backend/cmd/asterrouter/VERSION)"
          FRONTEND_VERSION="$(node -p "require('./frontend/package.json').version")"
          test "$BACKEND_VERSION" = "$EXPECTED_VERSION"
          test "$FRONTEND_VERSION" = "$EXPECTED_VERSION"

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build release assets
        run: bash scripts/build-release.sh "${{ steps.meta.outputs.version }}"

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Validate release assets
        env:
          ASTER_TEST_ARM64_RUNTIME: '1'
        run: bash scripts/test-release-artifacts.sh "${{ steps.meta.outputs.version }}"

      - name: Validate candidate release runtime
        env:
          ASTER_RELEASE_RUNTIME_DIR: ${{ runner.temp }}/asterrouter-release-runtime
          ASTER_RELEASE_TEST_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_release_test?sslmode=disable
        run: bash scripts/test-release-runtime.sh "${{ steps.meta.outputs.version }}"

      - name: Install Chromium for candidate browser journeys
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Create isolated candidate-browser databases
        env:
          PGPASSWORD: asterrouter
        run: |
          set -euo pipefail
          for database in platform_setup enterprise relay_operator personal platform; do
            psql --host=127.0.0.1 --username=asterrouter --dbname=postgres \
              --command="CREATE DATABASE asterrouter_release_test_journey_${database}"
          done

      - name: Validate candidate browser journeys
        env:
          ASTER_RELEASE_JOURNEY_DIR: ${{ runner.temp }}/asterrouter-release-journeys
          ASTER_RELEASE_TEST_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_release_test_journey?sslmode=disable
        run: bash scripts/test-release-browser-journeys.sh "${{ steps.meta.outputs.version }}"

      - name: Validate Linux install, upgrade, and rollback
        env:
          ASTER_INSTALLER_TEST_DIR: ${{ runner.temp }}/asterrouter-installer-test
        run: sudo --preserve-env=ASTER_INSTALLER_TEST_DIR bash scripts/test-installer.sh

      - name: Upload release browser journey evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: asterrouter-release-browser-journeys
          path: |
            ${{ runner.temp }}/asterrouter-release-journeys/report.txt
            ${{ runner.temp }}/asterrouter-release-journeys/runtime.log
            ${{ runner.temp }}/asterrouter-release-journeys/fake-upstream.log
            ${{ runner.temp }}/asterrouter-release-journeys/setup/report.txt
            ${{ runner.temp }}/asterrouter-release-journeys/setup/runtime.log
            ${{ runner.temp }}/asterrouter-release-journeys/setup/playwright
            ${{ runner.temp }}/asterrouter-release-journeys/profiles
          if-no-files-found: ignore

      - name: Write release notes
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          TAG_MESSAGE="$(git tag -l --format='%(contents:body)' "$TAG")"
          cat > release-notes.md <<EOF
          > AsterRouter - AI Gateway Control Plane

          ${TAG_MESSAGE}

          ## Linux install or upgrade

          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/astercloud/asterrouter/main/deploy/install.sh | sudo bash
          asterrouter upgrade -v ${TAG}
          \`\`\`

          ## Release assets

          - asterrouter_${VERSION}_linux_amd64.tar.gz
          - asterrouter_${VERSION}_linux_arm64.tar.gz
          - asterrouter_${VERSION}_linux_amd64
          - asterrouter_${VERSION}_linux_arm64
          - checksums.txt
          - asterrouter_update_manifest.json
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: AsterRouter ${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/asterrouter_*_linux_amd64
            dist/asterrouter_*_linux_arm64
            dist/asterrouter_*_linux_amd64.tar.gz
            dist/asterrouter_*_linux_arm64.tar.gz
            dist/checksums.txt
            dist/asterrouter_update_manifest.json
